<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoresearch Dashboard - Resume Skill</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0A0A0A; color: #E0E0E0; padding: 24px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 0.85rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 20px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #00D4AA; }
  canvas { width: 100% !important; height: 300px !important; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #222; }
  th { color: #888; font-weight: 500; }
  .keep { color: #00D4AA; }
  .discard { color: #FF4444; }
  .baseline { color: #0066FF; }
  .score-big { font-size: 2rem; font-weight: bold; background: linear-gradient(135deg, #00D4AA, #0066FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-bar { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; flex: 1; text-align: center; }
  .stat-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 1.25rem; font-weight: bold; }
  .eval-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .eval-cell { background: #1a1a1a; border-radius: 4px; padding: 8px; text-align: center; font-size: 0.75rem; }
  .eval-pass { background: #0a2a1a; color: #00D4AA; }
  .eval-fail { background: #2a0a0a; color: #FF4444; }
</style>
</head>
<body>
<h1>Autoresearch Dashboard</h1>
<p class="subtitle">Resume Skill Optimisation | Auto-refreshes every 10s</p>

<div class="status-bar" id="statusBar"></div>

<div class="grid">
  <div class="card">
    <h2>Score Progression</h2>
    <canvas id="lineChart"></canvas>
  </div>
  <div class="card">
    <h2>Experiment Scores</h2>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <h2>Experiment Log</h2>
  <table id="expTable">
    <thead><tr><th>#</th><th>Description</th><th>Score</th><th>Pass Rate</th><th>Status</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="card">
  <h2>Per-Eval Breakdown (Latest Experiment)</h2>
  <div id="evalGrid" class="eval-grid"></div>
</div>

<script>
let lineChart, barChart;

async function loadData() {
  try {
    const resp = await fetch('results.json?t=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) { console.log('Waiting for data...'); }
}

function render(data) {
  const exps = data.experiments || [];
  if (!exps.length) return;

  // Status bar
  const latest = exps[exps.length - 1];
  const baseline = exps[0];
  const kept = exps.filter(e => e.status === 'keep' || e.status === 'baseline').length;
  const discarded = exps.filter(e => e.status === 'discard').length;
  document.getElementById('statusBar').innerHTML = `
    <div class="stat"><div class="stat-label">Current Score</div><div class="stat-value score-big">${latest.score}/25</div></div>
    <div class="stat"><div class="stat-label">Pass Rate</div><div class="stat-value">${latest.pass_rate}%</div></div>
    <div class="stat"><div class="stat-label">Baseline</div><div class="stat-value">${baseline.score}/25</div></div>
    <div class="stat"><div class="stat-label">Kept / Discarded</div><div class="stat-value">${kept} / ${discarded}</div></div>
    <div class="stat"><div class="stat-label">Experiments</div><div class="stat-value">${exps.length - 1}</div></div>
  `;

  // Line chart
  const labels = exps.map(e => 'E' + e.experiment);
  const scores = exps.map(e => e.score);
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line', data: { labels, datasets: [{ label: 'Score', data: scores, borderColor: '#00D4AA', backgroundColor: 'rgba(0,212,170,0.1)', fill: true, tension: 0.3 }] },
    options: { scales: { y: { min: 0, max: 25, ticks: { color: '#888' }, grid: { color: '#222' } }, x: { ticks: { color: '#888' }, grid: { color: '#222' } } }, plugins: { legend: { display: false } } }
  });

  // Bar chart
  const colors = exps.map(e => e.status === 'baseline' ? '#0066FF' : e.status === 'keep' ? '#00D4AA' : '#FF4444');
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar', data: { labels, datasets: [{ label: 'Score', data: scores, backgroundColor: colors }] },
    options: { scales: { y: { min: 0, max: 25, ticks: { color: '#888' }, grid: { color: '#222' } }, x: { ticks: { color: '#888' }, grid: { color: '#222' } } }, plugins: { legend: { display: false } } }
  });

  // Table
  const tbody = document.querySelector('#expTable tbody');
  tbody.innerHTML = exps.map(e => `<tr>
    <td>${e.experiment}</td>
    <td>${e.description}</td>
    <td>${e.score}/${e.max_score}</td>
    <td>${e.pass_rate}%</td>
    <td class="${e.status}">${e.status.toUpperCase()}</td>
  </tr>`).join('');

  // Eval breakdown
  const evalNames = data.evals || [];
  const grid = document.getElementById('evalGrid');
  if (latest.eval_details) {
    grid.innerHTML = evalNames.map((name, i) => {
      const results = latest.eval_details[name] || [];
      const passes = results.filter(r => r).length;
      return `<div class="eval-cell ${passes >= 3 ? 'eval-pass' : 'eval-fail'}">${name.replace(/_/g, ' ')}<br><strong>${passes}/5</strong></div>`;
    }).join('');
  }
}

loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>
