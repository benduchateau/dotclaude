<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoresearch Dashboard — wrap skill</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0A0A0A; color: #E0E0E0; padding: 24px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; margin-bottom: 8px; background: linear-gradient(90deg, #00D4AA, #0066FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  h2 { font-size: 1.1rem; margin: 20px 0 8px; color: #aaa; }
  .meta { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; }
  canvas { max-height: 300px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid #222; }
  th { color: #888; font-weight: 600; }
  .keep { color: #00D4AA; } .discard { color: #ff4444; } .baseline { color: #0066FF; }
  .score-big { font-size: 2.4rem; font-weight: 700; }
  .pct { font-size: 1rem; color: #888; }
</style>
</head>
<body>
<h1>Autoresearch Dashboard</h1>
<p class="meta">Skill: <strong>wrap</strong> | Auto-refreshes every 10s</p>

<div class="grid">
  <div class="card">
    <h2>Score Progression</h2>
    <canvas id="lineChart"></canvas>
  </div>
  <div class="card">
    <h2>Experiment Scores</h2>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div class="card" style="margin-top: 20px;">
  <h2>Experiment Table</h2>
  <table id="expTable">
    <thead><tr><th>#</th><th>Score</th><th>Pass Rate</th><th>Status</th><th>Description</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="card" style="margin-top: 20px;">
  <h2>Per-Eval Breakdown (Latest)</h2>
  <table id="evalTable">
    <thead><tr><th>Eval</th><th>Pass Count (of 5)</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
let lineChart, barChart;
async function load() {
  try {
    const res = await fetch('results.json?t=' + Date.now());
    const data = await res.json();
    const exps = data.experiments || [];

    // Line chart
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    if (lineChart) lineChart.destroy();
    lineChart = new Chart(lineCtx, {
      type: 'line',
      data: {
        labels: exps.map(e => 'Exp ' + e.id),
        datasets: [{
          label: 'Score',
          data: exps.map(e => e.score),
          borderColor: '#00D4AA',
          backgroundColor: 'rgba(0,212,170,0.1)',
          fill: true, tension: 0.3
        }]
      },
      options: { scales: { y: { min: 0, max: 25, ticks: { color: '#666' } }, x: { ticks: { color: '#666' } } }, plugins: { legend: { display: false } } }
    });

    // Bar chart
    const barCtx = document.getElementById('barChart').getContext('2d');
    if (barChart) barChart.destroy();
    barChart = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: exps.map(e => 'Exp ' + e.id),
        datasets: [{
          label: 'Score',
          data: exps.map(e => e.score),
          backgroundColor: exps.map(e => e.status === 'keep' ? '#00D4AA' : e.status === 'baseline' ? '#0066FF' : '#ff4444')
        }]
      },
      options: { scales: { y: { min: 0, max: 25, ticks: { color: '#666' } }, x: { ticks: { color: '#666' } } }, plugins: { legend: { display: false } } }
    });

    // Experiment table
    const tbody = document.querySelector('#expTable tbody');
    tbody.innerHTML = exps.map(e =>
      `<tr><td>${e.id}</td><td>${e.score}/25</td><td>${e.pass_rate}</td><td class="${e.status}">${e.status}</td><td>${e.description}</td></tr>`
    ).join('');

    // Eval breakdown
    const evalBody = document.querySelector('#evalTable tbody');
    if (exps.length > 0) {
      const latest = exps[exps.length - 1];
      const evals = data.evals || [];
      evalBody.innerHTML = evals.map((name, i) =>
        `<tr><td>${name}</td><td>${latest.eval_breakdown ? latest.eval_breakdown[i] : '?'}/5</td></tr>`
      ).join('');
    }
  } catch (e) { console.log('Waiting for data...', e); }
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
